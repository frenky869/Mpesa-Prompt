<!DOCTYPE html>
<html>
<head>
    <title>M-Pesa Payment</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 350px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Pay with M-Pesa</h2>
        <input type="text" id="phone" placeholder="Phone (e.g., 0712345678)" />
        <input type="number" id="amount" placeholder="Amount (KES)" min="1" />
        <button id="payBtn">Pay Now</button>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('payBtn').addEventListener('click', async () => {
            const phone = document.getElementById('phone').value;
            const amount = document.getElementById('amount').value;
            const msg = document.getElementById('message');

            if (!phone || !amount) return msg.textContent = 'Fill all fields.';

            msg.textContent = 'Processing...';
            try {
                const res = await fetch('http://localhost:3000/api/stk-push', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: phone, amount }),
                });
                const data = await res.json();
                msg.textContent = res.ok ? '✅ ' + data.message : '❌ ' + data.error;
            } catch {
                msg.textContent = '❌ Network error.';
            }
        });
    </script>
</body>
</html>
